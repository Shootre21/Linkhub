version: '3.8'

services:
  linkhub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkhub-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./db/linkhub.db
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - NODE_ENV=production
    volumes:
      - linkhub-data:/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  linkhub-data:
